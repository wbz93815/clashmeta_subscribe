[custom]
; ==========================================================
; 方案 A · 最终修正版（加入 Google / Microsoft + 冷门节点）
; - AI 专用静态住宅节点
; - Netflix HK / TW / SG
; - 漏网之鱼
; - 保留 HK / TW / JP / SG / US 五个 url-test 体系不动
; - 应用组不提供“全节点手动 / 全节点自动”越权
; - 全节点手动 / 自动 只放在 Default / 漏网之鱼
; - 新增：🧊 冷门节点（排除 HK/JP/TW/US/SG），并让所有应用可选
; - Adobe 提供 REJECT（可禁止联网）
; ==========================================================

; 开启规则生成器
enable_rule_generator=true
; 覆盖原订阅里的 rules 规则
overwrite_original_rules=true

; 节点清洗：剔除机场展示/说明/防失联/流量提示节点
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website


; 1) 规则（自上而下优先级）
; --- 私网直连 ---
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOIP,private,no-resolve

; --- Aethersailor 直连补丁 ---
ruleset=DIRECT,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=DIRECT,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

; --- Aethersailor 代理补丁（仅兜底用，不越权）---
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

; --- 国内直连 ---
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,cn,no-resolve

; --- 国内可用 / 下载 / BT ---
ruleset=DIRECT,[]GEOSITE,google-cn
ruleset=DIRECT,[]GEOSITE,category-games@cn
ruleset=DIRECT,[]GEOSITE,category-game-platforms-download
ruleset=DIRECT,[]GEOSITE,category-public-tracker

;------------请在下方区域内添加应用---------------
; --- 核心应用 ---
ruleset=🧠 AI,[]GEOSITE,openai
ruleset=🧠 AI,[]GEOSITE,category-ai-!cn

; --- 海外主流应用补充 ---
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix
ruleset=🎥 Netflix,[]GEOIP,netflix,no-resolve

; --- 海外主流应用补充 ---
ruleset=🤝 SocialMedia,[]GEOSITE,telegram
ruleset=🤝 SocialMedia,[]GEOIP,telegram,no-resolve
ruleset=🤝 SocialMedia,[]GEOSITE,tiktok
ruleset=🤝 SocialMedia,[]GEOIP,tiktok,no-resolve
ruleset=🤝 SocialMedia,[]GEOSITE,instagram
ruleset=🤝 SocialMedia,[]GEOSITE,twitter
ruleset=🎮 Steam,[]GEOSITE,steam

; --- 开发 / 工具 ---
ruleset=🛠 GitHub,[]GEOSITE,github
ruleset=🛠 GitHub,[]GEOIP,github,no-resolve
ruleset=🚝 测速工具,[]GEOSITE,category-speedtest

; --- 交易所 & Adobe（全部走 GEOSITE）---
ruleset=🤑 Crypto,[]GEOSITE,okx
ruleset=🤑 Crypto,[]GEOSITE,binance
ruleset=🤑 Crypto,[]GEOSITE,bybit
ruleset=🤑 Crypto,[]GEOSITE,kraken
ruleset=🤑 Crypto,[]GEOSITE,coinbase
ruleset=🤑 Crypto,[]GEOSITE,bitget
ruleset=🤑 Crypto,[]GEOSITE,kucoin
ruleset=🤑 Crypto,[]GEOSITE,gateio
ruleset=🤑 Crypto,[]GEOSITE,mexc

;------------请在上方区域内添加应用---------------
; --- 社交 / 通讯 ---
ruleset=🤝 SocialMedia,[]GEOSITE,category-communication
ruleset=🤝 SocialMedia,[]GEOSITE,category-social-media-!cn

; --- 最终兜底 ---
ruleset=🐟 漏网之鱼,[]FINAL

; 2) 应用分流策略组（UI 主入口，不越权）
custom_proxy_group=🧠 AI`select`[]DIRECT`[]DIRECT`(?i)^(?=.*住宅节点).*
custom_proxy_group=🎬 YouTube`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🎥 Netflix`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🛠 GitHub`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🤑 Crypto`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🎮 Steam`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🤝 SocialMedia`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🤝 SocialMedia`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*
custom_proxy_group=🚝 测速工具`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*

; 3) 漏网之鱼（唯一允许全节点）
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*`(?i)^(?=.*住宅节点).*

; 4) 全局模式
custom_proxy_group=🌍 全局模式`select`[]DIRECT`(?i).*(香港|台湾|新加坡|日本|美国|俄罗斯|加拿大|印尼|印度|土耳其|巴西|德国|澳大利亚|英国|荷兰|菲律宾|韩国|马来西亚).*`(?i)^(?=.*住宅节点).*

